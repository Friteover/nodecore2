<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeCore - Premium Vault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.3/purify.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        :root {
            --bg-base: #09090b;
            --bg-panel: rgba(20, 20, 23, 0.7);
            --bg-hover: rgba(39, 39, 42, 0.6);
            --accent-primary: #8b5cf6;
            --accent-secondary: #3b82f6;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --border-color: rgba(63, 63, 70, 0.4);
            --font-main: 'Inter', sans-serif;
            --font-mono: 'Consolas', monospace;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
        }

        /* Sidebar commune */
        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            z-index: 5;
        }
        .left-sidebar { border-right: 1px solid var(--border-color); }
        .right-sidebar { border-left: 1px solid var(--border-color); width: 260px; padding: 20px; gap: 25px; }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h2 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 6px;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }
        .btn-icon:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .search-bar {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-color);
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            margin-left: 10px;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        /* Note list */
        .note-list { flex: 1; overflow-y: auto; padding: 10px; }
        .note-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-bottom: 4px;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .note-item:hover, .note-item.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .note-item.active {
            border-left: 3px solid var(--accent-primary);
            background: rgba(139, 92, 246, 0.1);
        }
        .delete-note-btn {
            opacity: 0;
            transition: var(--transition);
        }
        .note-item:hover .delete-note-btn { opacity: 1; }

        /* Section Sauvegarde Bas de Page */
        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar-footer h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .save-actions {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px;
            font-size: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
        }
        .btn-action:hover {
            background: var(--bg-hover);
            border-color: var(--accent-primary);
        }

        /* Workspace */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #121214 0%, #09090b 100%);
        }

        .workspace-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .title-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            font-weight: 600;
            outline: none;
            width: 40%;
        }

        .view-actions { display: flex; gap: 8px; }
        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-btn.active, .tab-btn:hover {
            background: var(--text-primary);
            color: var(--bg-base);
            border-color: var(--text-primary);
        }
        #btn-merge-note:hover {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        #btn-print-pdf:hover {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border-color: var(--accent-secondary);
        }

        /* Editor container & views */
        .workspace-body { flex: 1; position: relative; overflow: hidden; }
        .editor-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .editor-pane {
            flex: 1;
            height: 100%;
            padding: 30px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 15px;
            line-height: 1.7;
            outline: none;
            resize: none;
            border-right: 1px solid var(--border-color);
        }

        .preview-pane {
            flex: 1;
            height: 100%;
            padding: 30px 40px;
            overflow-y: auto;
            line-height: 1.7;
        }

        /* Graph View */
        .graph-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #09090b;
            z-index: 2;
        }

        /* Modale de fusion de Nodes */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            padding: 25px;
            border-radius: var(--radius-lg);
            width: 420px;
            display: flex; flex-direction: column; gap: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .modal-content h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .modal-select {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: var(--radius-md);
            outline: none;
            font-family: var(--font-main);
            font-size: 14px;
            cursor: pointer;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 5px; }
        .btn-confirm { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
        .btn-confirm:hover { background: #7c3aed; }

        /* Markdown Styling inside Preview */
        .preview-pane h1, .preview-pane h2, .preview-pane h3 {
            margin: 24px 0 12px 0;
            color: var(--text-primary);
            font-weight: 600;
        }
        .preview-pane h1 { font-size: 2em; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;}
        .preview-pane h2 { font-size: 1.5em; }
        .preview-pane p { margin-bottom: 16px; color: #d4d4d8;}
        
        /* Wikilink Rendering */
        .wikilink {
            color: var(--accent-primary);
            text-decoration: none;
            background: rgba(139, 92, 246, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            border-bottom: 1px solid rgba(139, 92, 246, 0.4);
            transition: var(--transition);
        }
        .wikilink:hover {
            background: rgba(139, 92, 246, 0.3);
            color: #fff;
        }

        /* Right Sidebar Lists */
        .sidebar-section h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .backlink-item {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            margin-bottom: 6px;
            cursor: pointer;
            font-size: 13px;
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .backlink-item:hover {
            border-color: var(--border-color);
            background: var(--bg-hover);
        }
        .tag-pill {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-secondary);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
        }

        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* ==========================================================================
           FEUILLE DE STYLE D'IMPRESSION ET DE MISE EN PAGE PDF DYNAMIQUE
           ========================================================================== */
        @media print {
            body, html {
                background: #ffffff !important;
                color: #000000 !important;
                height: 100% !important;
                overflow: visible !important;
            }
            /* Dissimulation globale de l'interface applicative */
            .sidebar, .workspace-header, .modal-overlay, .editor-pane, #tags-container, #backlinks-container {
                display: none !important;
            }
            .app-layout, .main-workspace, .workspace-body {
                display: block !important;
                height: 100% !important;
                width: 100% !important;
                background: none !important;
                position: static !important;
            }

            /* --- CAS 1 : IMPRESSION MODE ÉDITEUR (TEXTE SEUL) --- */
            body.view-editor-active .preview-pane {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                padding: 0mm !important;
                margin: 0mm !important;
                color: #000000 !important;
            }
            body.view-editor-active .preview-pane h1, 
            body.view-editor-active .preview-pane h2, 
            body.view-editor-active .preview-pane h3, 
            body.view-editor-active .preview-pane p {
                color: #000000 !important;
            }
            body.view-editor-active .preview-pane h1 {
                border-bottom: 2px solid #000000 !important;
            }
            body.view-editor-active .graph-container {
                display: none !important;
            }

            /* --- CAS 2 : IMPRESSION MODE GRAPHE (INVERSION INTELLIGENTE) --- */
            body.view-graph-active .editor-container {
                display: none !important;
            }
            body.view-graph-active .graph-container {
                display: block !important;
                position: fixed !important;
                top: 0; left: 0; 
                width: 100vw !important; height: 100vh !important;
                background: #ffffff !important;
                z-index: 9999;
            }
            body.view-graph-active .graph-container svg {
                background: #ffffff !important;
                width: 100vw !important;
                height: 100vh !important;
            }
            body.view-graph-active .graph-container line {
                stroke: #444444 !important;
                stroke-opacity: 0.6 !important;
                stroke-width: 1.5px !important;
            }
            body.view-graph-active .graph-container text {
                fill: #000000 !important;
                font-weight: 600 !important;
                text-shadow: 0 1px 2px #ffffff !important;
            }
            body.view-graph-active .graph-container circle {
                stroke: #111111 !important;
                stroke-width: 2px !important;
            }

            .wikilink {
                background: none !important;
                color: #000000 !important;
                text-decoration: underline !important;
                border: none !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="app-layout">
        
        <aside class="sidebar left-sidebar glass-panel">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-cubes"></i> NodeCore Vault</h2>
                <button class="btn-icon" id="new-note-btn" title="Nouvelle note"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass" style="color:var(--text-secondary)"></i>
                <input type="text" id="search-input" placeholder="Recherche ou créer... (Ctrl+K)">
            </div>
            
            <div class="note-list" id="note-list"></div>

            <div class="sidebar-footer">
                <h3>NodeCore Sync</h3>
                <div class="save-actions">
                    <button class="btn-action" id="btn-export" title="Enregistrer sous nodecore.uyt">
                        <i class="fa-solid fa-download"></i> Exporter
                    </button>
                    <button class="btn-action" id="btn-import" title="Ouvrir un fichier .uyt">
                        <i class="fa-solid fa-upload"></i> Importer
                    </button>
                </div>
                <input type="file" id="file-uploader" accept=".uyt" style="display: none;">
            </div>
        </aside>

        <main class="main-workspace">
            <header class="workspace-header glass-panel">
                <input type="text" id="note-title" class="title-input" placeholder="Sans titre">
                <div class="view-actions">
                    <button class="tab-btn" id="btn-print-pdf" title="Exporter en PDF / Imprimer"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                    <button class="tab-btn" id="btn-merge-note" title="Fusionner des nodes"><i class="fa-solid fa-code-merge"></i> Fusionner</button>
                    <button class="tab-btn active" id="btn-mode-editor"><i class="fa-solid fa-pen-nib"></i> Éditeur</button>
                    <button class="tab-btn" id="btn-mode-graph"><i class="fa-solid fa-diagram-project"></i> Graphe</button>
                </div>
            </header>
            
            <div class="workspace-body">
                <div class="editor-container" id="editor-view-pane">
                    <textarea class="editor-pane" id="markdown-editor" placeholder="Écris ici... Utilise [[Une Autre Note]] pour lier les idées."></textarea>
                    <div class="preview-pane" id="markdown-preview"></div>
                </div>

                <div class="graph-container hidden" id="graph-view-pane"></div>
            </div>
        </main>

        <aside class="sidebar right-sidebar glass-panel">
            <div class="sidebar-section">
                <h3><i class="fa-solid fa-link-slash"></i> Liens Entrants</h3>
                <div id="backlinks-container"></div>
            </div>
            <div class="sidebar-section">
                <h3><i class="fa-solid fa-hashtag"></i> Tags Détectés</h3>
                <div id="tags-container"></div>
            </div>
        </aside>

    </div>

    <div id="merge-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <h3><i class="fa-solid fa-code-merge" style="color:var(--accent-primary)"></i> Absorber une autre note</h3>
            <p style="font-size: 13px; color: var(--text-secondary);">Le contenu et les tags de la note choisie seront fusionnés à la suite de votre note actuelle. La note choisie sera ensuite supprimée.</p>
            <select id="merge-target-select" class="modal-select"></select>
            <div class="modal-actions">
                <button class="btn-action" id="btn-cancel-merge">Annuler</button>
                <button class="btn-action btn-confirm" id="btn-confirm-merge">Fusionner les données</button>
            </div>
        </div>
    </div>

    <script>
        // --- ÉTAT GLOBAL DE L'APPLICATION ---
        let state = {
            notes: [],
            activeNoteId: null,
            searchQuery: ""
        };

        // --- GESTION DU STOCKAGE & FICHIERS .UYT ---
        const Storage = {
            load() {
                const data = localStorage.getItem('nodecore_vault_notes');
                if (data) {
                    state.notes = JSON.parse(data);
                } else {
                    state.notes = [
                        { id: '1', title: 'Bienvenue', content: '# Bienvenue dans NodeCore\n\nVoici ton espace de pensée interconnecté.\n\nRegarde ton graphe évoluer grâce aux liens dynamiques comme ceci : [[Réseau de Pensées]].\n\nTu peux sauvegarder l\'intégralité de tes données dans un fichier physique grâce au menu de synchronisation en bas à gauche.\n\n#systeme #nodecore', tags: ['#systeme', '#nodecore'] },
                        { id: '2', title: 'Réseau de Pensées', content: '# Réseau de Pensées\n\nLes wikilinks permettent de créer des ponts entre les fichiers.\n\nRetourner vers [[Bienvenue]].', tags: [] }
                    ];
                    this.save();
                }
            },
            save() {
                localStorage.setItem('nodecore_vault_notes', JSON.stringify(state.notes));
            },
            exportToUyt() {
                const dataStr = JSON.stringify(state.notes, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = "nodecore.uyt";
                link.click();
                
                URL.revokeObjectURL(url);
            },
            importFromUyt(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedNotes = JSON.parse(e.target.result);
                        if (Array.isArray(importedNotes)) {
                            state.notes = importedNotes;
                            this.save();
                            if (state.notes.length > 0) {
                                UI.setActiveNote(state.notes[0].id);
                            }
                            UI.renderNoteList();
                        } else {
                            alert("Format .uyt invalide (Données corrompues).");
                        }
                    } catch (err) {
                        alert("Impossible de lire ce fichier .uyt.");
                    }
                };
                reader.readAsText(file);
            }
        };

        // --- PARSER DE WIKILINKS & LOGIQUE CORE ---
        function parseWikilinks(markdown) {
            return markdown.replace(/\[\[(.*?)\]\]/g, (match, title) => {
                return `<a href="#" class="wikilink" data-target="${title.trim()}">${title.trim()}</a>`;
            });
        }

        function extractTags(content) {
            const matches = content.match(/#[a-zA-Z0-9À-ÿ_]+/g);
            return matches ? [...new Set(matches)] : [];
        }

        // --- RENDU DE L'INTERFACE UI ---
        const UI = {
            init() {
                Storage.load();
                marked.setOptions({ breaks: true, gfm: true });

                // Event Listeners Globaux
                document.getElementById('new-note-btn').addEventListener('click', () => UI.createNewNote());
                document.getElementById('markdown-editor').addEventListener('input', (e) => UI.handleEditorInput(e));
                document.getElementById('note-title').addEventListener('input', (e) => UI.handleTitleInput(e));
                document.getElementById('search-input').addEventListener('input', (e) => UI.handleSearch(e));
                
                // Interaction Import / Export .uyt
                document.getElementById('btn-export').addEventListener('click', () => Storage.exportToUyt());
                const fileUploader = document.getElementById('file-uploader');
                document.getElementById('btn-import').addEventListener('click', () => fileUploader.click());
                fileUploader.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        Storage.importFromUyt(e.target.files[0]);
                    }
                });

                // Raccourci de Recherche (Ctrl + K)
                window.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                        e.preventDefault();
                        document.getElementById('search-input').focus();
                    }
                });

                // Actionneurs d'interface
                document.getElementById('btn-mode-editor').addEventListener('click', () => UI.switchView('editor'));
                document.getElementById('btn-mode-graph').addEventListener('click', () => UI.switchView('graph'));
                document.getElementById('btn-merge-note').addEventListener('click', () => UI.toggleMergeModal(true));
                document.getElementById('btn-cancel-merge').addEventListener('click', () => UI.toggleMergeModal(false));
                document.getElementById('btn-confirm-merge').addEventListener('click', () => UI.executeNodeMerge());
                
                // Déclencheur Impression / PDF dynamique
                document.getElementById('btn-print-pdf').addEventListener('click', () => window.print());

                // Intercepter les clics sur les Wikilinks générés dans la Preview
                document.getElementById('markdown-preview').addEventListener('click', (e) => {
                    if (e.target.classList.contains('wikilink')) {
                        e.preventDefault();
                        UI.navigateToNoteTitle(e.target.getAttribute('data-target'));
                    }
                });

                if (state.notes.length > 0) {
                    UI.setActiveNote(state.notes[0].id);
                } else {
                    UI.createNewNote();
                }
                
                // Initialise la vue par défaut
                UI.switchView('editor');
                UI.renderNoteList();
            },

            renderNoteList() {
                const container = document.getElementById('note-list');
                container.innerHTML = '';

                const filteredNotes = state.notes.filter(note => 
                    note.title.toLowerCase().includes(state.searchQuery.toLowerCase()) ||
                    note.content.toLowerCase().includes(state.searchQuery.toLowerCase())
                );

                filteredNotes.forEach(note => {
                    const item = document.createElement('div');
                    item.className = `note-item ${note.id === state.activeNoteId ? 'active' : ''}`;
                    item.innerHTML = `
                        <span><i class="fa-regular fa-file-lines" style="margin-right:8px"></i> ${note.title || 'Sans titre'}</span>
                        <button class="btn-icon delete-note-btn" data-id="${note.id}"><i class="fa-regular fa-trash-can"></i></button>
                    `;
                    
                    item.addEventListener('click', (e) => {
                        if (e.target.closest('.delete-note-btn')) {
                            e.stopPropagation();
                            UI.deleteNote(note.id);
                        } else {
                            UI.setActiveNote(note.id);
                        }
                    });
                    container.appendChild(item);
                });
            },

            setActiveNote(id) {
                state.activeNoteId = id;
                const note = state.notes.find(n => n.id === id);
                if (!note) return;

                document.getElementById('note-title').value = note.title;
                document.getElementById('markdown-editor').value = note.content;
                
                UI.renderPreview(note.content);
                UI.renderBacklinksAndTags(note);
                UI.renderNoteList();

                if (!document.getElementById('graph-view-pane').classList.contains('hidden')) {
                    Graph.render();
                }
            },

            createNewNote(defaultTitle = "") {
                const title = defaultTitle || `Note du ${new Date().toLocaleDateString()}`;
                const newNote = {
                    id: Date.now().toString(),
                    title: title,
                    content: `# ${title}\n\n`,
                    tags: []
                };
                state.notes.push(newNote);
                Storage.save();
                UI.setActiveNote(newNote.id);
            },

            deleteNote(id) {
                state.notes = state.notes.filter(n => n.id !== id);
                Storage.save();
                if (state.activeNoteId === id && state.notes.length > 0) {
                    UI.setActiveNote(state.notes[0].id);
                } else if (state.notes.length === 0) {
                    UI.createNewNote();
                } else {
                    UI.renderNoteList();
                }
            },

            handleEditorInput(e) {
                const note = state.notes.find(n => n.id === state.activeNoteId);
                if (note) {
                    note.content = e.target.value;
                    note.tags = extractTags(note.content);
                    Storage.save();
                    UI.renderPreview(note.content);
                    UI.renderBacklinksAndTags(note);
                }
            },

            handleTitleInput(e) {
                const note = state.notes.find(n => n.id === state.activeNoteId);
                if (note) {
                    note.title = e.target.value;
                    Storage.save();
                    UI.renderNoteList();
                }
            },

            handleSearch(e) {
                state.searchQuery = e.target.value;
                UI.renderNoteList();
            },

            renderPreview(content) {
                const convertedHtml = parseWikilinks(content);
                const safeHtml = DOMPurify.sanitize(marked.parse(convertedHtml));
                document.getElementById('markdown-preview').innerHTML = safeHtml;
            },

            renderBacklinksAndTags(currentNote) {
                const tagsContainer = document.getElementById('tags-container');
                tagsContainer.innerHTML = '';
                currentNote.tags.forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'tag-pill';
                    span.innerText = tag;
                    tagsContainer.appendChild(span);
                });

                const backlinksContainer = document.getElementById('backlinks-container');
                backlinksContainer.innerHTML = '';

                const backlinks = state.notes.filter(note => {
                    if (note.id === currentNote.id) return false;
                    const regex = new RegExp(`\\[\\[${currentNote.title}\\]\\]`, 'i');
                    return regex.test(note.content);
                });

                if (backlinks.length === 0) {
                    backlinksContainer.innerHTML = '<div style="font-size:12px;color:var(--text-secondary)">Aucun lien entrant</div>';
                } else {
                    backlinks.forEach(note => {
                        const div = document.createElement('div');
                        div.className = 'backlink-item';
                        div.innerHTML = `<i class="fa-regular fa-file"></i> ${note.title}`;
                        div.addEventListener('click', () => UI.setActiveNote(note.id));
                        backlinksContainer.appendChild(div);
                    });
                }
            },

            navigateToNoteTitle(title) {
                const targetNote = state.notes.find(n => n.title.toLowerCase() === title.toLowerCase());
                if (targetNote) {
                    UI.setActiveNote(targetNote.id);
                } else {
                    UI.createNewNote(title);
                }
            },

            toggleMergeModal(show) {
                const modal = document.getElementById('merge-modal');
                const select = document.getElementById('merge-target-select');
                
                if (show) {
                    select.innerHTML = '';
                    const eligibleNotes = state.notes.filter(n => n.id !== state.activeNoteId);
                    
                    if (eligibleNotes.length === 0) {
                        alert("Vous devez avoir au moins une autre note dans votre coffre pour pouvoir effectuer une fusion.");
                        return;
                    }

                    eligibleNotes.forEach(note => {
                        const opt = document.createElement('option');
                        opt.value = note.id;
                        opt.innerText = note.title || "Sans titre";
                        select.appendChild(opt);
                    });
                    modal.classList.remove('hidden');
                } else {
                    modal.classList.add('hidden');
                }
            },

            executeNodeMerge() {
                const targetSelect = document.getElementById('merge-target-select');
                const targetNoteId = targetSelect.value;
                
                const activeNote = state.notes.find(n => n.id === state.activeNoteId);
                const targetNote = state.notes.find(n => n.id === targetNoteId);

                if (activeNote && targetNote) {
                    activeNote.content += `\n\n---\n### <i class="fa-solid fa-code-merge"></i> Contenu fusionné depuis *${targetNote.title}*\n\n${targetNote.content}`;
                    activeNote.tags = [...new Set([...activeNote.tags, ...targetNote.tags])];
                    state.notes = state.notes.filter(n => n.id !== targetNoteId);
                    
                    Storage.save();
                    UI.toggleMergeModal(false);
                    UI.setActiveNote(activeNote.id);
                    UI.renderNoteList();
                }
            },

            switchView(mode) {
                const editorPane = document.getElementById('editor-view-pane');
                const graphPane = document.getElementById('graph-view-pane');
                const btnEditor = document.getElementById('btn-mode-editor');
                const btnGraph = document.getElementById('btn-mode-graph');

                if (mode === 'editor') {
                    editorPane.classList.remove('hidden');
                    graphPane.classList.add('hidden');
                    btnEditor.classList.add('active');
                    btnGraph.classList.remove('active');
                    
                    // Modifie les classes du body pour le moteur d'impression CSS
                    document.body.classList.remove('view-graph-active');
                    document.body.classList.add('view-editor-active');
                } else {
                    editorPane.classList.add('hidden');
                    graphPane.classList.remove('hidden');
                    btnEditor.classList.remove('active');
                    btnGraph.classList.add('active');
                    
                    // Modifie les classes du body pour le moteur d'impression CSS
                    document.body.classList.remove('view-editor-active');
                    document.body.classList.add('view-graph-active');
                    Graph.render();
                }
            }
        };

        // --- MODULE GRAPH DE CONNAISSANCE (D3.js) ---
        const Graph = {
            render() {
                const container = document.getElementById('graph-view-pane');
                container.innerHTML = '';

                const width = container.clientWidth || 600;
                const height = container.clientHeight || 500;

                const nodes = state.notes.map(note => ({
                    id: note.id,
                    title: note.title,
                    isActive: note.id === state.activeNoteId
                }));

                const links = [];
                state.notes.forEach(sourceNote => {
                    const matches = sourceNote.content.match(/\[\[(.*?)\]\]/g);
                    if (matches) {
                        matches.forEach(match => {
                            const targetTitle = match.slice(2, -2).trim();
                            const targetNote = state.notes.find(n => n.title.toLowerCase() === targetTitle.toLowerCase());
                            if (targetNote) {
                                links.push({
                                    source: sourceNote.id,
                                    target: targetNote.id
                                });
                            }
                        });
                    }
                });

                const svg = d3.select('#graph-view-pane')
                    .append('svg')
                    .attr('width', '100%')
                    .attr('height', '100%')
                    .call(d3.zoom().on('zoom', (event) => {
                        g.attr('transform', event.transform);
                    }))
                    .append('g');

                const g = svg.append('g');

                const simulation = d3.forceSimulation(nodes)
                    .force('link', d3.forceLink(links).id(d => d.id).distance(100))
                    .force('charge', d3.forceManyBody().strength(-150))
                    .force('center', d3.forceCenter(width / 2, height / 2));

                const linkElement = g.append('g')
                    .attr('stroke', 'rgba(255,255,255,0.15)')
                    .attr('stroke-width', 1.5)
                    .selectAll('line')
                    .data(links)
                    .join('line');

                const nodeElement = g.append('g')
                    .selectAll('g')
                    .data(nodes)
                    .join('g')
                    .attr('cursor', 'pointer')
                    .on('click', (event, d) => {
                        UI.switchView('editor');
                        UI.setActiveNote(d.id);
                    });

                nodeElement.append('circle')
                    .attr('r', d => d.isActive ? 9 : 6)
                    .attr('fill', d => d.isActive ? '#8b5cf6' : '#3b82f6')
                    .attr('stroke', '#fff')
                    .attr('stroke-width', d => d.isActive ? 2 : 0);

                nodeElement.append('text')
                    .text(d => d.title)
                    .attr('x', 12)
                    .attr('y', 4)
                    .style('fill', d => d.isActive ? '#fff' : '#a1a1aa')
                    .style('font-size', '12px')
                    .style('font-family', 'sans-serif');

                simulation.on('tick', () => {
                    linkElement
                        .attr('x1', d => d.source.x)
                        .attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x)
                        .attr('y2', d => d.target.y);

                    nodeElement.attr('transform', d => `translate(${d.x}, ${d.y})`);
                });

                nodeElement.call(d3.drag()
                    .on('start', (event, d) => {
                        if (!event.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on('drag', (event, d) => {
                        d.fx = event.x; d.fy = event.y;
                    })
                    .on('end', (event, d) => {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    })
                );
            }
        };

        window.addEventListener('DOMContentLoaded', () => UI.init());
    </script>
</body>
</html>
